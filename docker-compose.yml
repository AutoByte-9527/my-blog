services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"  # HTTPS (uncomment after configuring SSL certificates)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      # - ./ssl:/etc/nginx/ssl:ro  # Uncomment to enable HTTPS
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/articles"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
